<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TruckCALL">
  <meta name="theme-color" content="#2e7d32">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>TruckCALL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      background: #1b5e20;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2e7d32;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    #status-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      background: rgba(0,0,0,0.2);
      padding: 4px 12px;
      border-radius: 20px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #aaa;
      transition: background 0.3s;
    }

    #status-dot.connected { background: #69f0ae; }
    #status-dot.connecting { background: #ffd740; animation: pulse 1s infinite; }
    #status-dot.error { background: #ff5252; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    main {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #permission-banner {
      background: #ff8f00;
      border-radius: 12px;
      padding: 16px 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    #permission-banner p {
      font-size: 15px;
      line-height: 1.5;
    }

    #permission-banner button {
      background: #fff;
      color: #e65100;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      align-self: flex-start;
    }

    #notifications-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #notifications-section h2 {
      font-size: 14px;
      opacity: 0.7;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #notification-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .notif-item {
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: slideIn 0.3s ease;
    }

    .notif-item.new {
      background: rgba(105, 240, 174, 0.2);
      border: 1px solid rgba(105, 240, 174, 0.4);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .notif-title {
      font-size: 17px;
      font-weight: 700;
    }

    .notif-body {
      font-size: 16px;
      line-height: 1.4;
    }

    .notif-time {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 2px;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      opacity: 0.5;
      padding: 40px;
      text-align: center;
    }

    #empty-state .icon { font-size: 48px; }
    #empty-state p { font-size: 16px; line-height: 1.5; }

    footer {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
    <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
  </svg>
  <h1>TruckCALL</h1>
  <div id="status-badge">
    <div id="status-dot" class="connecting"></div>
    <span id="status-text">接続中...</span>
  </div>
</header>

<main>
  <div id="permission-banner">
    <p>📣 通知を受け取るには、通知の許可が必要です</p>
    <button id="permission-btn" onclick="requestPermission()">通知を許可する</button>
  </div>

  <div id="notifications-section">
    <h2>受信した通知</h2>
    <ul id="notification-list"></ul>
    <div id="empty-state">
      <div class="icon">🔔</div>
      <p>通知を待機中です<br>呼び出しがあるとここに表示されます</p>
    </div>
  </div>
</main>

<footer>TruckCALL 通知システム</footer>

<script>
  const TOPIC = 'truckcall-paq4tt3scnnk';
  const SSE_URL = `https://ntfy.sh/${TOPIC}/sse`;
  const MAX_NOTIFICATIONS = 5;

  let notifications = [];
  let reconnectDelay = 2000;
  let es = null;

  // サービスワーカー登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(console.error);
  }

  // 通知許可状態チェック
  function checkPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
      document.getElementById('permission-banner').style.display = 'flex';
    }
  }

  async function requestPermission() {
    const result = await Notification.requestPermission();
    if (result === 'granted') {
      document.getElementById('permission-banner').style.display = 'none';
    }
  }

  // ステータス更新
  function setStatus(state, text) {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-text');
    dot.className = '';
    dot.classList.add(state);
    label.textContent = text;
  }

  // 通知を画面に追加
  function addNotification(title, body, isNew = true) {
    const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    notifications.unshift({ title, body, time: now, isNew });
    if (notifications.length > MAX_NOTIFICATIONS) notifications.pop();
    renderNotifications();

    // OS通知を表示（許可済みの場合）
    if (Notification.permission === 'granted') {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(title || 'TruckCALL', {
            body: body || '呼び出しがあります',
            icon: '/icon-192.png',
            tag: 'truckcall',
            renotify: true,
            requireInteraction: true,
          });
        });
      }
    }
  }

  function renderNotifications() {
    const list = document.getElementById('notification-list');
    const empty = document.getElementById('empty-state');

    if (notifications.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'flex';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = notifications.map((n, i) => `
      <li class="notif-item ${i === 0 && n.isNew ? 'new' : ''}">
        ${n.title ? `<div class="notif-title">${escHtml(n.title)}</div>` : ''}
        <div class="notif-body">${escHtml(n.body)}</div>
        <div class="notif-time">${n.time}</div>
      </li>
    `).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // SSE接続
  function connect() {
    setStatus('connecting', '接続中...');

    es = new EventSource(SSE_URL);

    es.addEventListener('open', () => {
      setStatus('connected', '接続済み');
      reconnectDelay = 2000;
    });

    es.addEventListener('message', e => {
      try {
        const data = JSON.parse(e.data);
        if (data.event === 'message') {
          addNotification(data.title || 'TruckCALL', data.message || '');
        }
      } catch {}
    });

    es.addEventListener('error', () => {
      setStatus('error', '再接続中...');
      es.close();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    });
  }

  checkPermission();
  connect();
</script>

</body>
</html>
